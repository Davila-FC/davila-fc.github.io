<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f3d0f">
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <title>Da Vila Finanças</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
        }

        /* ===== TOAST DE INSTALAÇÃO ===== */
        #install-toast {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #1a5c1a 0%, #0f3d0f 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9999;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-bottom: 2px solid #d4af37;
        }
        #install-toast.show {
            transform: translateY(0);
        }
        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast-icon {
            font-size: 28px;
            color: #d4af37;
        }
        .toast-text h4 {
            margin: 0;
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .toast-text p {
            margin: 2px 0 0 0;
            font-size: 12px;
            opacity: 0.8;
        }
        .toast-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-install {
            background-color: #d4af37;
            color: #0f3d0f;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }
        .btn-close-toast {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        /* ===== TELA DE CARREGAMENTO (LOADER) ===== */
        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a5c1a 0%, #0f3d0f 60%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader-logo {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        
        .logo-blend {
            mix-blend-mode: screen;
        }

        .app-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 42px;
            color: white;
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .app-subtitle {
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 4px;
            margin: -5px 0 30px 0;
            text-transform: uppercase;
        }
        .modern-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ===== CONTAINER DO IFRAME ===== */
        #app-container {
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }
        #app-container.loaded {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="install-toast">
        <div class="toast-content">
            <span class="material-symbols-outlined toast-icon">add_to_home_screen</span>
            <div class="toast-text">
                <h4>Instalar App Da Vila</h4>
                <p>Adicione à tela inicial para acessar mais rápido.</p>
            </div>
        </div>
        <div class="toast-actions">
            <button id="install-btn" class="btn-install">Instalar</button>
            <button id="close-toast-btn" class="btn-close-toast">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </div>

    <div id="loader">
        <div class="loader-content">
            <div class="logo-container">
                <img src="web-app-manifest-512x512.png" alt="Logo" class="loader-logo logo-blend">
            </div>
            <div class="app-title">DA VILA</div>
            <div class="app-subtitle">FINANÇAS</div>
            <div class="modern-spinner"></div>
        </div>
    </div>

    <iframe 
        id="app-container" 
        src="https://script.google.com/macros/s/AKfycbyvSgH1GvR8T2A1WvSWeR5m76S02h7Lw3j8V8Y8p-w/exec" 
        allow="geolocation; microphone; camera">
    </iframe>

    <script>
        const iframe = document.getElementById('app-container');
        const loader = document.getElementById('loader');

        // Esconde o loader assim que o iframe do GAS terminar de carregar
        iframe.onload = function() {
            loader.style.opacity = '0';
            loader.style.visibility = 'hidden';
            iframe.classList.add('loaded');
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        };

        // ==========================================
        // LÓGICA DE INSTALAÇÃO DO PWA (BANNER)
        // ==========================================
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallToast();
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            hideInstallToast();
        });

        document.getElementById('close-toast-btn').addEventListener('click', () => {
            hideInstallToast();
        });

        window.addEventListener('appinstalled', () => {
            hideInstallToast();
            deferredPrompt = null;
        });

        function showInstallToast() {
            setTimeout(() => {
                document.getElementById('install-toast').classList.add('show');
            }, 3000); // Atraso de 3 segundos para não atrapalhar o carregamento
        }

        function hideInstallToast() {
            document.getElementById('install-toast').classList.remove('show');
        }

        // Registra o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
