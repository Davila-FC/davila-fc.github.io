<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f3d0f">
    
    <!-- Link do Manifesto PWA -->
    <link rel="manifest" href="manifest.json">
    
    <title>Da Vila Finanças</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0f3d0f; /* Cor do fundo do seu app */
            overflow: hidden;
            font-family: 'Manrope', sans-serif;
        }

        /* Tela de Loading inicial (enquanto o iframe carrega) */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a5c1a 0%, #0f3d0f 50%, #2d7a2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease-out;
        }

        #loader.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loader-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p {
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Iframe que segura o Apps Script */
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <!-- Tela de Carregamento da Casca -->
    <div id="loader">
        <!-- Use o link da sua logo hospedada em algum lugar (imgur, etc) -->
        <img src="https://iili.io/KUH9urG.png" alt="Logo" class="loader-logo">
        <div class="spinner"></div>
        <p>DA VILA</p>
    </div>

    <!-- Iframe que carrega o Apps Script (SEM a barra de cabeçalho do Google) -->
    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbyI8yGk3gTfJqFe9p2HXJJnOKCU2n1GJBdKYpWQxdknIFmiTgHBrwfH9s1u2FJb4Czb/exec" onload="hideLoader()"></iframe>

    <script>
        function hideLoader() {
            // Dá um pequeno atraso para garantir que o conteúdo renderizou
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide');
            }, 500);
        }

        // Registra o Service Worker para virar PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js').then(function(registration) {
                    console.log('ServiceWorker registrado com sucesso: ', registration.scope);
                }, function(err) {
                    console.log('Falha ao registrar ServiceWorker: ', err);
                });
            });
        }
    </script>
</body>
</html>
