<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f3d0f">
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <title>Da Vila Finanças</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0a0a0a;
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
        }

        /* ===== TOAST DE INSTALAÇÃO ===== */
        #install-toast {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: linear-gradient(135deg, #1a5c1a 0%, #0f3d0f 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 9999;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-bottom: 2px solid #d4af37;
        }
        #install-toast.show {
            transform: translateY(0);
        }
        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .toast-icon {
            font-size: 28px;
            color: #d4af37;
        }
        .toast-text h4 {
            margin: 0;
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .toast-text p {
            margin: 2px 0 0 0;
            font-size: 12px;
            opacity: 0.8;
        }
        .toast-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-install {
            background-color: #d4af37;
            color: #0f3d0f;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }
        .btn-close-toast {
            background: transparent;
            border: none;
            color: white;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        /* ===== TELA DE CARREGAMENTO (LOADER) ===== */
        #loader {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a5c1a 0%, #0f3d0f 60%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .loader-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loader-logo {
            width: 75px;
            height: 75px;
            object-fit: contain;
        }
        
        /* TRUQUE PARA SUMIR COM O FUNDO FALSO DA LOGO */
        .logo-blend {
            mix-blend-mode: screen;
        }

        .app-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 42px;
            color: white;
            letter-spacing: 3px;
            margin: 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .app-subtitle {
            font-size: 14px;
            color: #d4af37;
            letter-spacing: 4px;
            margin: -5px 0 30px 0;
            text-transform: uppercase;
        }
        .modern-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #d4af37;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
