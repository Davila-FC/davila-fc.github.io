<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f3d0f">
    
    <link rel="manifest" href="manifest.json">
    <!-- Carregando os ícones do Google para o toast -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    
    <title>Da Vila Finanças</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0f3d0f;
            overflow: hidden;
            font-family: 'Manrope', sans-serif;
        }

        /* ===== TOAST DE INSTALAÇÃO ===== */
        #install-toast {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: #ffffff;
            color: #1a1a1a;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 9999; /* Fica acima de TUDO */
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(-100%); /* Escondido acima da tela */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            padding-top: max(16px, env(safe-area-inset-top)); /* Respeita o entalhe do iPhone */
        }

        #install-toast.show {
            transform: translateY(0); /* Desce para a tela */
        }

        .toast-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .toast-icon {
            color: #1a5c1a;
            font-size: 28px;
        }

        .toast-text {
            display: flex;
            flex-direction: column;
        }

        .toast-title {
            font-weight: 800;
            font-size: 14px;
            line-height: 1.2;
        }

        .toast-desc {
            font-size: 12px;
            color: #666;
        }

        .toast-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
        }

        .btn-install {
            background-color: #1a5c1a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-install:active {
            background-color: #0f3d0f;
        }

        .btn-close-toast {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
        }

        /* ===== TELA DE LOADING ===== */
        #loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a5c1a 0%, #0f3d0f 50%, #2d7a2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease-out;
        }

        #loader.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loader-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        p {
            color: white;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* Iframe que segura o Apps Script */
        #app-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <!-- Toast de Instalação do App -->
    <div id="install-toast">
        <div class="toast-content">
            <span class="material-symbols-outlined toast-icon">download</span>
            <div class="toast-text">
                <span class="toast-title">Instale o App Da Vila</span>
                <span class="toast-desc">Acesse mais rápido, offline e sem barra de busca</span>
            </div>
        </div>
        <div class="toast-actions">
            <button id="install-btn" class="btn-install">Instalar</button>
            <button id="close-toast-btn" class="btn-close-toast">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </div>

    <!-- Tela de Carregamento da Casca -->
    <div id="loader">
        <img src="https://iili.io/KUH9urG.png" alt="Logo" class="loader-logo">
        <div class="spinner"></div>
        <p>DA VILA</p>
    </div>

    <script>
        // ==========================================
        // LÓGICA DO APP (Iframe e Loader)
        // ==========================================
        function loadApp() {
            var appUrl = "https://script.google.com/macros/s/AKfycbzdpFHhXb5XmoaFdRuSvCbRggBHrvGZvBI0B7LP5qk/dev";
            
            var iframe = document.createElement('iframe');
            iframe.src = appUrl;
            iframe.id = 'app-frame';
            iframe.style.cssText = 'width:100%; height:100%; border:none; position:absolute; top:0; left:0; z-index:1;';
            iframe.onload = function() {
                setTimeout(function() {
                    document.getElementById('loader').classList.add('hide');
                }, 1000);
            };
            document.body.appendChild(iframe);
        }

        loadApp();

        // ==========================================
        // LÓGICA DE INSTALAÇÃO DO PWA (Toast)
        // ==========================================
        let deferredPrompt;

        // 1. O navegador detecta que o site é instalável e dispara este evento
        window.addEventListener('beforeinstallprompt', (e) => {
            // Impede o mini-infobar padrão do Chrome de aparecer
            e.preventDefault();
            // Guarda o evento para podermos acioná-lo depois
            deferredPrompt = e;
            // Mostra o nosso toast customizado
            showInstallToast();
        });

        // 2. Quando o usuário clica no botão "Instalar" do nosso toast
        document.getElementById('install-btn').addEventListener('click', async () => {
            if (!deferredPrompt) {
                return; // Se não tiver o evento, não faz nada
            }
            
            // Aciona o prompt nativo do celular (Aquele menu de baixo pra cima do Android)
            deferredPrompt.prompt();
            
            // Espera o usuário responder (instalou ou cancelou?)
            const { outcome } = await deferredPrompt.userChoice;
            
            // Limpa a variável (só pode ser usada uma vez)
            deferredPrompt = null;
            
            // Esconde o toast
            hideInstallToast();
        });

        // 3. Quando o usuário clica no X para fechar o toast
        document.getElementById('close-toast-btn').addEventListener('click', () => {
            hideInstallToast();
        });

        // 4. Se o app já foi instalado, esconde o toast
        window.addEventListener('appinstalled', () => {
            hideInstallToast();
            deferredPrompt = null;
            console.log('App Da Vila instalado com sucesso!');
        });

        function showInstallToast() {
            setTimeout(() => {
                document.getElementById('install-toast').classList.add('show');
            }, 3000); // Atraso de 3 segundos para não aparecer junto com o loading
        }

        function hideInstallToast() {
            document.getElementById('install-toast').classList.remove('show');
        }

        // Registra o Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
